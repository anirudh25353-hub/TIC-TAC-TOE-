<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic Tac Toe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-grid"></div>

  <div class="container">

    <header>
      <div class="logo">✕ ○</div>
      <h1>Tic Tac Toe</h1>
      <p class="subtitle">Two players. One winner. No mercy.</p>
    </header>

    <!-- Score Board -->
    <div class="scoreboard">
      <div class="score-card" id="score-x">
        <span class="score-symbol x">✕</span>
        <span class="score-label">Player X</span>
        <span class="score-value" id="x-score">0</span>
      </div>
      <div class="score-divider">
        <span class="draws-label">Draws</span>
        <span class="score-value" id="draw-score">0</span>
      </div>
      <div class="score-card" id="score-o">
        <span class="score-symbol o">○</span>
        <span class="score-label">Player O</span>
        <span class="score-value" id="o-score">0</span>
      </div>
    </div>

    <!-- Status Message -->
    <div class="status-bar">
      <div class="status-indicator" id="turn-indicator"></div>
      <p class="status-text" id="status-text">Player X's turn</p>
    </div>

    <!-- Game Board -->
    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <!-- Action Buttons -->
    <div class="actions">
      <button class="btn btn-primary" id="restart-btn">New Round</button>
      <button class="btn btn-secondary" id="reset-btn">Reset Scores</button>
    </div>

  </div>

  <!-- Win Overlay -->
  <div class="overlay" id="overlay">
    <div class="overlay-card">
      <div class="overlay-symbol" id="overlay-symbol"></div>
      <h2 class="overlay-title" id="overlay-title"></h2>
      <p class="overlay-sub" id="overlay-sub"></p>
      <button class="btn btn-primary" id="overlay-btn">Play Again</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
